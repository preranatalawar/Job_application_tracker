<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
  background-attachment: fixed;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 50px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.header h2 {
  font-size: 24px;
}

.actions {
  display: flex;
  gap: 10px;
}

.add-btn {
  background: #22c55e;
  color: white;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.logout-btn {
  background: #ef4444;
  color: white;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 40px 60px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

.card h4 {
  color: #cbd5f5;
}

.card p {
  font-size: 30px;
  font-weight: 700;
}

/* JOB CARD */
.job {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin-top: 18px;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
}

.company {
  font-size: 18px;
  font-weight: 700;
}

.role {
  font-size: 14px;
  color: #cbd5f5;
}

.status {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  display: inline-block;
}

.pending { background:#facc15; color:black; }
.interview { background:#22c55e; color:black; }
.rejected { background:#ef4444; color:white; }

.date {
  font-size: 12px;
  color: #94a3b8;
}

/* BUTTONS */
.job-right button {
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-left: 6px;
  cursor: pointer;
  background: #334155;
  color: white;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 40px;
  border-radius: 16px;
  width: 600px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.save-btn {
  background: #22c55e;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
}

.cancel-btn {
  background: #ef4444;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
}
</style>

</head>

<body>

<div class="header">
  <h2>Job Application Tracker</h2>

  <div class="actions">
    <button class="add-btn" onclick="openModal()">+ Add Application</button>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="container">

  <div class="cards">
    <div class="card"><h4>Total</h4><p id="total">0</p></div>
    <div class="card"><h4>Pending</h4><p id="pending">0</p></div>
    <div class="card"><h4>Interview</h4><p id="interview">0</p></div>
    <div class="card"><h4>Rejected</h4><p id="rejected">0</p></div>
  </div>

  <div style="margin-top:20px; display:flex; gap:10px;">
  <input id="searchInput" placeholder="Search company or role"
  style="padding:10px; border-radius:8px; border:none;">

  <select id="filterStatus" style="padding:10px; border-radius:8px;">
    <option value="All">All</option>
    <option>Pending</option>
    <option>Interview</option>
    <option>Rejected</option>
  </select>

  <select id="sortSelect" style="padding:10px; border-radius:8px;">
    <option value="new">Latest</option>
    <option value="company">Company</option>
  </select>

  <button onclick="toggleTheme()">🌙</button>
</div>
  
  <h3 style="margin-top:30px;">Recent Applications</h3>
  <div id="jobList"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Add Application</h2>

    <form id="jobForm">

     <select id="company">
<option>Select a Company</option>
<option>Google</option>
<option>Microsoft</option>
<option>Amazon</option>
<option>Meta</option>
<option>Apple</option>
<option>Netflix</option>
<option>Adobe</option>
<option>Oracle</option>
<option>IBM</option>
<option>Intel</option>
<option>Nvidia</option>
<option>Salesforce</option>
<option>Uber</option>
<option>Airbnb</option>
<option>Spotify</option>
<option>TCS</option>
<option>Infosys</option>
<option>Wipro</option>
<option>HCL</option>
<option>Tech Mahindra</option>
<option>Accenture</option>
<option>Deloitte</option>
<option>Capgemini</option>
<option>Cognizant</option>
<option>PwC</option>
<option>KPMG</option>
<option>EY</option>
<option>Flipkart</option>
<option>Swiggy</option>
<option>Zomato</option>
<option>Paytm</option>
<option>PhonePe</option>
<option>BYJU'S</option>
<option>Zoho</option>
<option>Freshworks</option>
</select>

      <select id="role">
<option>Select a Role</option>
<option>Software Engineer</option>
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full Stack Developer</option>
<option>Data Analyst</option>
<option>Data Scientist</option>
<option>Machine Learning Engineer</option>
<option>AI Engineer</option>
<option>Cloud Engineer</option>
<option>DevOps Engineer</option>
<option>Site Reliability Engineer</option>
<option>QA Engineer</option>
<option>Test Engineer</option>
<option>Automation Engineer</option>
<option>UI/UX Designer</option>
<option>Product Manager</option>
<option>Project Manager</option>
<option>Business Analyst</option>
<option>System Engineer</option>
<option>Network Engineer</option>
<option>Cyber Security Analyst</option>
<option>Security Engineer</option>
<option>Mobile App Developer</option>
<option>Android Developer</option>
<option>iOS Developer</option>
<option>Game Developer</option>
<option>Blockchain Developer</option>
<option>AR/VR Developer</option>
<option>Technical Support Engineer</option>
<option>Database Administrator</option>
<option>Big Data Engineer</option>
<option>Embedded Systems Engineer</option>
</select>

      <select id="status">
        <option>Pending</option>
        <option>Interview</option>
        <option>Rejected</option>
      </select>

      <input id="date" type="date">

      <input id="notes" placeholder="Notes (HR / Salary)">
<!-- //<input type="file" id="resume"> -->

      <button type="submit" class="save-btn">Save</button>
      <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>

    </form>
  </div>
</div>

<!-- ONLY CHANGES ARE MARKED WITH ✅ -->

<script>

function logout(){
  window.location.href="/";
}

let editId=null;

document.getElementById("searchInput").addEventListener("input", loadJobs);
document.getElementById("filterStatus").addEventListener("change", loadJobs);
document.getElementById("sortSelect").addEventListener("change", loadJobs);

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

function openModal(){
  editId=null;
  modalTitle.innerText="Add Application";
  jobForm.reset();
  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

jobForm.addEventListener("submit", async e=>{
  e.preventDefault();

const job={
  company: document.getElementById("company").value,
  role: document.getElementById("role").value,
  status: document.getElementById("status").value,
  date: document.getElementById("date").value,
  notes: document.getElementById("notes").value
};

showToast("Saved");

  if(editId){
    await fetch(`/jobs/${editId}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(job)});
  } else {
    await fetch("/jobs/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(job)});
  }

  closeModal();
  loadJobs();
});


// ✅ FIXED EDIT FUNCTION
function editJob(id,companyVal,roleVal,statusVal,dateVal,notesVal){
  openModal();
  editId=id;
  modalTitle.innerText="Update Job";

  company.value=companyVal;
  role.value=roleVal;
  status.value=statusVal || "Pending";
  date.value=dateVal;
  notes.value=notesVal || "";
}

async function deleteJob(id){
  await fetch(`/jobs/${id}`,{method:"DELETE"});
  showToast("Deleted");
  loadJobs();
}

async function loadJobs(){
  const res=await fetch("/jobs");
 let data=await res.json();
 console.log(data);

const search = document.getElementById("searchInput").value.toLowerCase();
const filter = document.getElementById("filterStatus").value;
const sort = document.getElementById("sortSelect").value;

if(sort==="company"){
  data.sort((a,b)=>a.company.localeCompare(b.company));
}

// ✅ FIX ADDED (latest sort)
if(sort==="new"){
  data.reverse();
}

  jobList.innerHTML="";

  let pending=0,interview=0,rejected=0;

data.forEach(j=>{

  let status = j.status;

  if(!j.company.toLowerCase().includes(search) &&
     !j.role.toLowerCase().includes(search)) return;

  if(filter !== "All" && status !== filter) return;

  let cls="";
  if(status==="Pending") cls="pending";
  if(status==="Interview") cls="interview";
  if(status==="Rejected") cls="rejected";

    jobList.innerHTML+=`
    <div class="job">
      <div>
        <div class="company">${j.company}</div>
        <div class="role">${j.role}</div>
        <div class="status ${cls}">${status}</div>
        ${status==="Interview" ? `<div style="font-size:12px;color:#22c55e;">Interview coming</div>` : ""}
        <div class="date">${j.date||""}</div>
        ${j.notes ? `<div style="font-size:12px;">📝 ${j.notes}</div>` : ""}
      </div>

      <div class="job-right">

        <!-- ✅ FIXED BUTTON -->
        <button onclick="editJob('${j._id}','${j.company}','${j.role}','${j.status}','${j.date}','${j.notes||""}')">✏️</button>

        <button onclick="deleteJob('${j._id}')">🗑️</button>
      </div>
    </div>`;

    if(status==="Pending") pending++;
    if(status==="Interview") interview++;
    if(status==="Rejected") rejected++;
  });

  total.innerText=data.length;
  document.getElementById("pending").innerText=pending;
  document.getElementById("interview").innerText=interview;
  document.getElementById("rejected").innerText=rejected;
}

let isDark = true;

function toggleTheme(){
  if(isDark){
    document.body.style.background = "#f5f5f5";
    document.body.style.color = "black";
    isDark = false;
  } else {
    document.body.style.background = "linear-gradient(135deg,#0f172a,#1e293b)";
    document.body.style.color = "white";
    isDark = true;
  }
}

loadJobs();

</script>

<div id="toast"
style="position:fixed; bottom:20px; right:20px;
background:#22c55e; color:white;
padding:10px 20px; border-radius:8px; display:none;">
Done
</div>

</body>
</html>
